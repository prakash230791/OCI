# OCI Homelab - Destroy Workflow
# SAFETY: Only triggers on manual workflow_dispatch — never runs automatically.
# Destroys ALL Terraform-managed OCI resources. This action is irreversible.

name: Destroy OCI Homelab

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type DESTROY to confirm you want to delete all resources"
        required: true
        default: ""

jobs:
  destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest

    # Extra safety guard — job only runs if the user typed DESTROY exactly
    if: github.event.inputs.confirm == 'DESTROY'

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout repository
      # -----------------------------------------------------------------------
      - name: Checkout code
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # 2. Install Terraform
      # -----------------------------------------------------------------------
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      # -----------------------------------------------------------------------
      # 3. Write OCI private key
      # -----------------------------------------------------------------------
      - name: Write OCI private key
        run: |
          echo "${{ secrets.OCI_PRIVATE_KEY }}" > oci_key.pem
          chmod 600 oci_key.pem

      # -----------------------------------------------------------------------
      # 4. Patch provider to use private_key_path
      # -----------------------------------------------------------------------
      - name: Patch provider to use private_key_path
        run: |
          sed -i 's/private_key  = var.private_key/private_key_path = "oci_key.pem"/' main.tf

      # -----------------------------------------------------------------------
      # 5. Generate terraform.tfvars from GitHub Secrets
      # -----------------------------------------------------------------------
      - name: Create terraform.tfvars
        run: |
          cat > terraform.tfvars <<EOF
          tenancy_ocid   = "${{ secrets.OCI_TENANCY_OCID }}"
          user_ocid      = "${{ secrets.OCI_USER_OCID }}"
          fingerprint    = "${{ secrets.OCI_FINGERPRINT }}"
          private_key    = ""
          region         = "${{ secrets.OCI_REGION }}"
          ssh_public_key = "${{ secrets.SSH_PUBLIC_KEY }}"
          EOF

      # -----------------------------------------------------------------------
      # 6. Terraform init
      # -----------------------------------------------------------------------
      - name: Terraform Init
        run: terraform init

      # -----------------------------------------------------------------------
      # 7. Terraform destroy — removes VCN, subnet, security list, instance, etc.
      # -----------------------------------------------------------------------
      - name: Terraform Destroy
        run: |
          echo "WARNING: Destroying all OCI homelab resources..."
          terraform destroy -auto-approve
          echo "========================================"
          echo "  All resources destroyed successfully."
          echo "========================================"
          echo "  Instance, VCN, subnets, and security"
          echo "  lists have been removed from OCI."
          echo "========================================"
